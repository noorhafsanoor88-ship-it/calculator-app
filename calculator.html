<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
    .calc { width: 280px; background: #1c1c1c; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    #display { width: 100%; height: 60px; font-size: 28px; text-align: right; margin-bottom: 15px; padding: 10px; border: none; background: #333; color: white; border-radius: 8px; box-sizing: border-box; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    button { height: 55px; font-size: 20px; border: none; border-radius: 8px; background: #505050; color: white; cursor: pointer; }
    button:hover { background: #707070; }
    .op { background: #ff9500; }
    .op:hover { background: #ffb143; }
    .clear { background: #d4d4d2; color: black; }
  </style>
</head>
<body>
  <div class="calc">
    <input id="display" value="0" disabled>
    <div class="buttons">
      <button onclick="clr()" class="clear">C</button>
      <button onclick="addToDisplay('/')" class="op">/</button>
      <button onclick="addToDisplay('*')" class="op">*</button>
      <button onclick="del()" class="clear">DEL</button>
      <button onclick="addToDisplay('7')">7</button>
      <button onclick="addToDisplay('8')">8</button>
      <button onclick="addToDisplay('9')">9</button>
      <button onclick="addToDisplay('-')" class="op">-</button>
      <button onclick="addToDisplay('4')">4</button>
      <button onclick="addToDisplay('5')">5</button>
      <button onclick="addToDisplay('6')">6</button>
      <button onclick="addToDisplay('+')" class="op">+</button>
      <button onclick="addToDisplay('1')">1</button>
      <button onclick="addToDisplay('2')">2</button>
      <button onclick="addToDisplay('3')">3</button>
      <button onclick="calculate()" class="op" style="grid-row: span 2">=</button>
      <button onclick="addToDisplay('0')" style="grid-column: span 2">0</button>
      <button onclick="addToDisplay('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    
    function addToDisplay(value) {
      if (display.value === '0' || display.value === 'Error') {
        display.value = value;
      } else {
        display.value += value;
      }
    }
    
    function clr() {
      display.value = '0';
    }
    
    function del() {
      if (display.value.length > 1) {
        display.value = display.value.slice(0, -1);
      } else {
        display.value = '0';
      }
    }
    
    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
